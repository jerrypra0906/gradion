<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gradion — Login (mockup)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col bg-gray-50 text-gray-900">
  <div class="bg-slate-800 text-slate-100 text-xs px-4 py-2 flex flex-wrap gap-4">
    <span class="font-semibold text-amber-300">Mockup</span>
    <a href="index.html" class="hover:text-white">Index</a>
    <span class="text-slate-400">02 Login</span>
  </div>

  <div class="flex-1 flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full space-y-8">
      <div class="text-center">
        <h2 class="text-3xl font-extrabold text-gray-900">Parent sign in</h2>
        <p class="mt-2 text-sm text-gray-600 max-w-md mx-auto">
          Track progress, logs, and collaborate with your care team.
        </p>
        <p class="mt-2 text-sm text-gray-600">
          Or <a href="#" class="font-medium text-blue-600 hover:text-blue-500">create a new account</a>
        </p>
      </div>

      <form class="mt-8 space-y-6 bg-white p-8 rounded-lg shadow-sm border border-gray-200" action="#" method="post">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
          <input id="email" name="email" type="email" required autocomplete="email"
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <input id="password" name="password" type="password" required
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" />
        </div>
        <div class="flex items-center justify-between text-sm">
          <span></span>
          <a href="#" class="font-medium text-blue-600 hover:text-blue-500">Forgot password?</a>
        </div>
        <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md text-sm font-medium text-white bg-blue-600 hover:bg-blue-700">
          Sign in
        </button>

        <div class="relative">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300"></div></div>
          <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-gray-500">Or continue with</span></div>
        </div>
        <button type="button" class="w-full flex justify-center items-center gap-2 py-2.5 px-4 border border-gray-300 rounded-md bg-white text-sm font-medium text-gray-700 hover:bg-gray-50">
          <span class="w-5 h-5 rounded bg-gray-200"></span> Google
        </button>

        <p class="text-center text-sm text-gray-600">
          <a href="#" class="font-medium text-blue-600">Resend verification email</a>
        </p>
      </form>

      <p class="text-center text-xs text-gray-500">
        <a href="#" class="text-blue-600">Admin</a> ·
        <a href="#" class="text-blue-600">Parent</a> ·
        <a href="#" class="text-blue-600">Consultant</a> ·
        <a href="#" class="text-blue-600">General sign in</a>
      </p>
    </div>
  </div>

  <footer class="py-6 text-center text-xs text-gray-500 border-t border-gray-200">
    © Gradion · <a href="01-landing.html" class="text-blue-600">Back to landing</a>
  </footer>
</body>
</html>
